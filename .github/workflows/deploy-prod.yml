name: Deploy (production)

on:
  push:
    branches: [ main ]
  workflow_dispatch: {}

permissions:
  id-token: write
  contents: read

concurrency:
  group: deploy-production
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: prod

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Sanity check config is here
        run: |
          pwd
          ls -la
          test -f sst.config.ts && echo "Found sst.config.ts"

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install root deps (SST)
        run: npm ci

      - name: Install Next.js deps
        working-directory: aciujums
        run: npm ci

      - name: Setup uv
        uses: astral-sh/setup-uv@v5

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::${{ vars.ACCOUNT_ID }}:role/aciujums-deploy-prod
          aws-region: ${{ vars.REGION }}

      - name: Deploy SST (stage=production)
        run: npx sst deploy --stage production
        env:
          ALERT_EMAIL: ${{ secrets.ALERT_EMAIL }}
