name: Deploy (dev)

on:
  push:
    branches: [ dev ]
  workflow_dispatch: {}

permissions:
  id-token: write
  contents: read

concurrency:
  group: deploy-dev
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: dev
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      
      - name: Sanity check config is here
        run: |
          pwd
          ls -la
          test -f sst.config.ts && echo "Found sst.config.ts"

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'

      - name: Install deps
        run: npm ci

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::${{ vars.ACCOUNT_ID }}:role/aciujums-deploy-dev
          aws-region: ${{ vars.REGION }}

      - name: Deploy SST (stage=dev)
        run: npx sst deploy --stage dev
