name: Deploy (dev)

on:
  push:
    branches: [ dev ]
  workflow_dispatch: {}

permissions:
  id-token: write
  contents: read

concurrency:
  group: deploy-dev
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: dev

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'

      - name: Install root deps (SST)
        run: npm ci

      - name: Install Next.js deps
        working-directory: aciujums
        run: npm ci

      - name: Setup uv
        uses: astral-sh/setup-uv@v5

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::${{ vars.ACCOUNT_ID }}:role/aciujums-deploy-dev
          aws-region: ${{ vars.REGION }}

      - name: Restore SST state
        run: |
          mkdir -p .sst
          aws s3 sync s3://sst-state-stfvbzbwauro/ci-state/dev/ .sst/ \
            --exclude "platform/*" || true

      - name: Install SST platform deps
        run: npx sst install

      - name: Deploy SST (stage=dev)
        run: npx sst deploy --stage dev
        env:
          ALERT_EMAIL: ${{ secrets.ALERT_EMAIL }}

      - name: Save SST state
        if: always()
        run: |
          aws s3 sync .sst/ s3://sst-state-stfvbzbwauro/ci-state/dev/ \
            --exclude "platform/*"
